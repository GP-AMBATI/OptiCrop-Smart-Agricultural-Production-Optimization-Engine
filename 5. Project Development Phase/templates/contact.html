{% extends 'base.html' %}

{% block content %}
<div class="row gy-4 justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm border-0 p-4">
      <h2 class="text-success">Contact OptiCrop</h2>
      <p class="text-muted">Reach out for support, deployment guidance, or agricultural analytics consulting.</p>
      <form class="row g-3" action="/contact" method="post">
        <div class="col-md-6"><label class="form-label">Name</label><input type="text" class="form-control" placeholder="Your name" disabled /></div>
        <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" placeholder="you@example.com" disabled /></div>
        <div class="col-12"><label class="form-label">Message</label><textarea class="form-control" rows="5" placeholder="Contact support via GitHub or deployment docs" disabled></textarea></div>
        <div class="col-12"><button type="button" class="btn btn-success" disabled>Contact form is disabled in this demo</button></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
